# 배포본(tarball) 수동 생성 — 태그 없이 실행 가능. Actions → Build release package → Run workflow
name: Build release package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: "Install & build & test"
        run: |
          npm ci
          npm run build
          npm test

      - name: Build UPM package
        run: node scripts/deukpack_build_upm.js

      - name: Create npm tarball
        run: npm pack

      - name: Create UPM tarball
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          tar -czf "app.deukpack.runtime-${PKG_VER}.tgz" -C upm .

      - name: Show package version
        run: node -p "require('./package.json').version"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: deukpack-release-${{ github.sha }}
          path: |
            deukpack-*.tgz
            app.deukpack.runtime-*.tgz
          retention-days: 90

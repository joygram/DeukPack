# Release: GitHub Release + npm tarball asset; optional npm publish (NPM_TOKEN secret)
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify package.json version matches tag
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          TAG_VER="${REF#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "Version mismatch: tag=$TAG_VER, package.json=$PKG_VER"
            echo "Before tagging, run: npm version <patch|minor|major> (or set version and commit), then tag with v$PKG_VER"
            exit 1
          fi
          echo "OK: tag $REF matches package.json $PKG_VER"

      - name: "Install & build & test"
        run: |
          npm ci
          npm run build
          npm test

      - name: Build UPM package
        run: node scripts/deukpack_build_upm.js

      - name: Commit UPM DLLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add upm/
          git diff --cached --quiet || git commit -m "ci: build UPM runtime DLLs for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Update tag to include DLLs
        run: |
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force

      - name: Create npm tarball
        run: npm pack

      - name: Create UPM tarball
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          tar -czf "app.deukpack.runtime-${PKG_VER}.tgz" -C upm .

      - name: "GitHub Release (assets: npm + UPM tarballs)"
        uses: "softprops/action-gh-release@v2"
        with:
          files: |
            deukpack-*.tgz
            app.deukpack.runtime-*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: add repo secret NPM_TOKEN, then uncomment to auto-publish registry
      # - name: Publish to npm
      #   run: npm publish --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

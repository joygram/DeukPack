# Release: GitHub Release + npm tarball asset; optional npm publish (NPM_TOKEN secret)
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify package.json version matches tag
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          TAG_VER="${REF#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "Version mismatch: tag=$TAG_VER, package.json=$PKG_VER"
            echo "Before tagging, run: npm version <patch|minor|major> (or set version and commit), then tag with v$PKG_VER"
            exit 1
          fi
          echo "OK: tag $REF matches package.json $PKG_VER"

      - name: "Install & build & test"
        run: |
          npm ci
          npm run build
          npm test

      - name: Create npm tarball
        run: npm pack

      - name: "GitHub Release (asset: npm tarball)"
        uses: "softprops/action-gh-release@v2"
        with:
          files: "deukpack-*.tgz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: add repo secret NPM_TOKEN, then uncomment to auto-publish registry
      # - name: Publish to npm
      #   run: npm publish --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

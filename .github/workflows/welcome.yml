name: Welcome New Contributors
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to the DeukPack community! 
            Thank you for opening this issue. Our maintainers will check it soon.
            
            If you're enjoying DeukPack, please consider giving us a ⭐ Star to support the project!
            https://github.com/joygram/DeukPack
          pr-message: |
            🎉 Thank you for your contribution to DeukPack!
            A reviewer will check your PR shortly. We appreciate your help!
            
            If you find DeukPack useful, don't forget to ⭐ Star the repository!
            https://github.com/joygram/DeukPack
